<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- ── Viewport & theme ──────────────────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#050510" />

    <!-- ── Primary SEO ──────────────────────────────────────────── -->
    <title>Air Quality Tracker — Real-Time AQI Map</title>
    <meta
      name="description"
      content="Explore real-time air quality data on an interactive 3D globe. Search any city worldwide and instantly see its Air Quality Index (AQI), powered by IQAir."
    />
    <meta
      name="keywords"
      content="air quality, AQI, air pollution, IQAir, real-time, 3D map, PM2.5, environment"
    />
    <meta name="author" content="Mario Armas" />
    <meta name="robots" content="index, follow" />

    <!-- ── Open Graph (Facebook / LinkedIn / WhatsApp) ──────────── -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Air Quality Tracker — Real-Time AQI Map"
    />
    <meta
      property="og:description"
      content="Explore real-time air quality data on an interactive 3D globe. Search any city worldwide and instantly see its AQI."
    />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />
    <meta property="og:url" content="https://air-quality-tracker.vercel.app" />
    <meta property="og:site_name" content="Air Quality Tracker" />
    <meta property="og:locale" content="en_US" />

    <!-- ── Twitter Card ──────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Air Quality Tracker — Real-Time AQI Map"
    />
    <meta
      name="twitter:description"
      content="Explore real-time air quality data on an interactive 3D globe. Search any city worldwide and instantly see its AQI."
    />
    <meta name="twitter:image" content="%PUBLIC_URL%/og-image.png" />

    <!-- ── Icons & manifest ──────────────────────────────────────── -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ── Canonical ────────────────────────────────────────────── -->
    <link rel="canonical" href="https://air-quality-tracker.vercel.app" />

    <!-- ── Preconnect to external APIs ──────────────────────────── -->
    <link rel="preconnect" href="https://api.airvisual.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ── Structured data (JSON-LD) ────────────────────────────── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Air Quality Tracker",
        "url": "https://air-quality-tracker.vercel.app",
        "description": "Real-time air quality monitoring on an interactive 3D globe, powered by IQAir.",
        "applicationCategory": "EnvironmentApplication",
        "operatingSystem": "Web",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
  </head>
  <body>
    <noscript>
      You need to enable JavaScript to run Air Quality Tracker.
    </noscript>
    <div id="root"></div>
  </body>
</html>
